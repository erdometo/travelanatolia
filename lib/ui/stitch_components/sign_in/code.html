<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-container-padding-mobile">
<!-- Background Layer -->
<div class="fixed inset-0 bg-hero -z-10" data-alt="A breathtaking panoramic view of the Aegean coast at sunset, with whitewashed stone architecture perched on rugged cliffs overlooking deep Mediterranean blue waters. The sky is a gradient of soft orange and warm terracotta, reflecting a sophisticated and atmospheric luxury aesthetic. Golden hour light creates long, soft shadows, evoking a sense of calm, premium exploration and welcoming identity tourism."></div>
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-10 text-center">
<h1 class="font-display-lg text-display-lg text-white drop-shadow-lg mb-2">TravelAnatolia</h1>
<p class="font-body-md text-white/90 font-medium italic">Discover your personal dialogue with the East.</p>
</div>
<!-- Sign In Card -->
<div class="glass-panel w-full rounded-xl p-8 shadow-2xl">
<h2 class="font-headline-lg text-headline-lg text-primary mb-6 text-center">Welcome Back</h2>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-on-surface placeholder:text-outline-variant" id="email" placeholder="hello@traveler.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-on-surface-variant block" for="password">Password</label>
<a class="font-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-container text-white font-bold py-4 rounded-full shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-200 mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Sign In Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-4 bg-transparent text-on-surface-variant font-medium">Or continue with</span>
</div>
</div>
<!-- Social Buttons Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-white border border-outline-variant/30 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all duration-200">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtywbMAXUVYNZGtavDSSiXSNxtFUajxQ3HBQig7b1ZOM0D4mAiVuCbO9Owqexk53KYGDP-wCkBL16yqKzKaTy7FPFDnzxiaQPi5ogjvOLfObUSMOZjU1nA8uDQyKVdSf5Fv5YGsHtL1pcML-Qq0frf4lU-pYYjzgFb9ytD6WOgDoi3KUUaDaGzFxYhfzL-4Itr8rIl5J9gQ-Fs42OXWI2E9PxBCJhgrbwsOTXEXun_SC7WLE-nm_HOcfH-ju1Ad4ilExvDdhFO2RNd"/>
<span class="font-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-white border border-outline-variant/30 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-sm text-on-surface">Apple</span>
</button>
</div>
<!-- Create Account Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4" href="#">Create an Account</a>
</p>
</div>

<a class="font-label-sm text-white/70 hover:text-white transition-colors" href="#">Terms of Service</a>
